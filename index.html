<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>PWAGram</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <!-- Link to the standard Manifest -->
  <link rel="manifest" href="/manifest.json">
  <!-- Safari Fallbacks -->
  <link rel="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-mobile-web-app-title" content="PWAGram">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-57x57.png" sizes="57x57">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-60x60.png" sizes="60x60">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-72x72.png" sizes="72x72">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-76x76.png" sizes="76x76">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-114x114.png" sizes="114x114">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-120x120.png" sizes="120x120">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-144x144.png" sizes="144x144">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-152x152.png" sizes="152x152">
  <link rel="apple-touch-icon" href="/src/images/icons/apple-icon-180x180.png" sizes="180x180">
  <!-- IE11 Metro App Fallbacks -->
  <meta name="msapplication-TileImage" content="/src/images/icons/app-icon-144x144.png">
  <meta name="msapplication-TileColor" content="#fff">
  <meta name="theme-color" content="#3f51b5">
</head>
<body class="font-[Roboto,sans-serif]">
  <div id="app">

    <!-- Fixed header -->
    <header class="fixed top-0 left-0 right-0 z-50 h-14 bg-indigo-700 shadow-md">
      <div class="flex items-center h-full px-4">
        <button id="menu-btn" class="mr-3 text-white md:hidden focus:outline-none" aria-label="Open menu">
          <span class="material-icons">menu</span>
        </button>
        <span class="text-white text-xl font-medium">PWAGram</span>
        <div class="flex-1"></div>
        <nav class="hidden md:flex items-center gap-4">
          <a class="text-white hover:text-indigo-200 font-medium text-sm" href="/">Feed</a>
          <a class="text-white hover:text-indigo-200 font-medium text-sm" href="/help/">Help</a>
          <button class="enable-notifications bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded text-sm font-medium transition-colors">
            Enable Notifications
          </button>
        </nav>
      </div>
    </header>

    <!-- Mobile drawer -->
    <div id="drawer" class="fixed inset-0 z-40 hidden" aria-hidden="true">
      <div id="drawer-overlay" class="absolute inset-0 bg-black/50"></div>
      <div class="absolute left-0 top-0 bottom-0 w-64 bg-white shadow-xl flex flex-col pt-4">
        <span class="px-4 pb-4 text-xl font-medium text-indigo-700 border-b border-gray-200">PWAGram</span>
        <nav class="flex flex-col mt-2">
          <a class="px-4 py-3 text-gray-700 hover:bg-gray-100 font-medium" href="/">Feed</a>
          <a class="px-4 py-3 text-gray-700 hover:bg-gray-100 font-medium" href="/help/">Help</a>
        </nav>
        <div class="p-4 mt-auto">
          <button class="enable-notifications w-full bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded text-sm font-medium transition-colors">
            Enable Notifications
          </button>
        </div>
      </div>
    </div>

    <main class="pt-14">
      <!-- Create-post modal -->
      <div id="create-post">
        <video id="player" autoplay></video>
        <canvas id="canvas" width="320px" height="240px"></canvas>
        <button class="btn-primary mt-3" id="capture-btn">Capture</button>
        <div id="pick-image">
          <h6 class="text-gray-600 text-sm font-medium mt-4 mb-2">Pick an Image Instead</h6>
          <input type="file" accept="image/*" id="image-picker">
        </div>
        <form class="p-4 w-full max-w-md mx-auto text-left">
          <div class="input-section">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="title">Title</label>
            <input class="form-input" type="text" id="title" placeholder="Give your moment a title">
          </div>
          <div class="input-section" id="manual-location">
            <label class="block text-sm font-medium text-gray-700 mb-1" for="location">Location</label>
            <input class="form-input" type="text" id="location" placeholder="Where was this taken?">
          </div>
          <div class="input-section flex items-center gap-3">
            <button class="btn-secondary" type="button" id="location-btn">Get Location</button>
            <div id="location-loader" class="spinner"></div>
          </div>
          <div class="input-section">
            <button class="btn-accent w-full" type="submit" id="post-btn">Post!</button>
          </div>
          <div class="input-section text-center">
            <button class="fab-close" id="close-create-post-modal-btn" type="button" aria-label="Close">
              <span class="material-icons">close</span>
            </button>
          </div>
        </form>
      </div>

      <!-- Feed -->
      <div class="page-content px-4 py-6">
        <h5 class="text-center text-indigo-700 font-medium text-lg mb-4">Share your Moments</h5>
        <div id="shared-moments"></div>
      </div>

      <!-- FAB -->
      <div class="floating-button">
        <button class="w-14 h-14 rounded-full bg-pink-500 hover:bg-pink-600 text-white flex items-center justify-center shadow-lg transition-colors" id="share-image-button" aria-label="Share a moment">
          <span class="material-icons">add</span>
        </button>
      </div>

      <!-- Toast -->
      <div id="confirmation-toast" class="toast" role="status" aria-live="polite">
        <span id="toast-message"></span>
      </div>
    </main>

  </div>
  <script type="module" src="/src/js/app.ts"></script>
  <script type="module" src="/src/js/feed.ts"></script>
</body>
</html>
